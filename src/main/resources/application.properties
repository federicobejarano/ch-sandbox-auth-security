spring.application.name=auth-spike
spring.profiles.active=dev

# H2 Database (in-memory, dev profile)
spring.datasource.url=jdbc:h2:mem:authdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
# Disable Open Session in View: avoids transparent lazy loading from the web
# layer, which masks N+1 queries and couples the controller to Hibernate's
# session lifecycle.
spring.jpa.open-in-view=false

# H2 Console (browseable at /h2-console; uses an iframe -> see frameOptions
# sameOrigin in SecurityConfig so the page is not blocked by X-Frame-Options).
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
# jwt.secret is a Base64-encoded string. After Decoders.BASE64.decode() it
# must yield >= 32 bytes (256 bits) so Keys.hmacShaKeyFor() can build an
# HmacSHA256 SecretKey without throwing WeakKeyException.
jwt.secret=dGhpcyBpcyBhIHNhbXBsZSBzZWNyZXQga2V5IGZvciBIUzI1NiBzaWduaW5n
jwt.expiration=3600000

# Dev logging: DEBUG on Spring Security is essential during the spike to
# observe FilterChainProxy ordering and authentication decisions.
logging.level.com.helenica.auth_spike=DEBUG
logging.level.org.springframework.security=DEBUG
