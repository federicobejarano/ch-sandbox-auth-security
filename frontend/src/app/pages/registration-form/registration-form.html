<ion-header>
  <ion-toolbar>
    <ion-title>Crear cuenta</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">
    <ion-item>
      <ion-input
        formControlName="name"
        label="Nombre"
        labelPlacement="floating"
        fill="outline"
        type="text"
        placeholder="Ingresá tu nombre"
        [errorText]="getErrorText(nameCtrl, { required: 'El nombre es obligatorio', minlength: 'Mínimo 2 caracteres', serverError: nameCtrl.getError('serverError') ?? '' })"
        [class.ion-invalid]="nameCtrl.invalid"
        [class.ion-touched]="nameCtrl.touched"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        formControlName="email"
        label="Email"
        labelPlacement="floating"
        fill="outline"
        type="email"
        placeholder="tucorreo@ejemplo.com"
        [errorText]="getErrorText(emailCtrl, { required: 'El email es obligatorio', email: 'Ingresá un email válido', serverError: emailCtrl.getError('serverError') ?? '' })"
        [class.ion-invalid]="emailCtrl.invalid"
        [class.ion-touched]="emailCtrl.touched"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        formControlName="password"
        label="Password"
        labelPlacement="floating"
        fill="outline"
        type="password"
        placeholder="Mínimo 8 caracteres"
        [errorText]="getErrorText(passwordCtrl, { required: 'El password es obligatorio', minlength: 'Mínimo 8 caracteres', serverError: passwordCtrl.getError('serverError') ?? '' })"
        [class.ion-invalid]="passwordCtrl.invalid"
        [class.ion-touched]="passwordCtrl.touched"
      ></ion-input>
    </ion-item>

    <ion-button type="submit" expand="block" [disabled]="registrationForm.invalid">
      Registrar
    </ion-button>
  </form>

  <div class="navigation-section">
    <ion-button routerLink="/login" expand="block" fill="outline" color="medium">
      Ya tengo cuenta
    </ion-button>
  </div>
</ion-content>
